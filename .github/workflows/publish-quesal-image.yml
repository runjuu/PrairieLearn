name: Publish Quesal image

# Builds the root Dockerfile (the full PrairieLearn image, which includes the
# question preview server at apps/prairielearn/dist/preview-server.js) and
# publishes a multi-arch (amd64 + arm64) image to GHCR. Each architecture is
# built natively on its own runner, then merged into one manifest so Docker
# auto-selects the right arch per machine (arm64 on Apple Silicon, amd64 on an
# x86 server). Pushes to the dedicated `quesal-image` branch retain the rolling
# development tags. Manual releases require an exact source commit and an
# explicit version tag, and deliberately do not move `latest`.

on:
  push:
    branches:
      - quesal-image
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Full 40-character source commit to build'
        required: true
        type: string
      release_tag:
        description: 'Versioned image tag to publish (for example preview-server-experimental-1-rc.1)'
        required: true
        type: string

concurrency:
  group: publish-quesal-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # Resolves to ghcr.io/runjuu/prairielearn (owner is already lowercase).
  IMAGE_NAME: ${{ github.repository_owner }}/prairielearn

jobs:
  prepare:
    name: Resolve immutable source
    runs-on: ubuntu-24.04
    outputs:
      source_sha: ${{ steps.source.outputs.sha }}
      source_short_sha: ${{ steps.source.outputs.short_sha }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_ref || github.sha }}

      - name: Verify immutable source
        id: source
        env:
          REQUESTED_SOURCE: ${{ inputs.source_ref || github.sha }}
        run: |
          if [[ ! "$REQUESTED_SOURCE" =~ ^[0-9a-f]{40}$ ]]; then
            echo "source_ref must be a full lowercase 40-character commit SHA" >&2
            exit 1
          fi
          source_sha=$(git rev-parse HEAD)
          if [[ "$source_sha" != "$REQUESTED_SOURCE" ]]; then
            echo "checked out $source_sha instead of requested source $REQUESTED_SOURCE" >&2
            exit 1
          fi
          echo "sha=$source_sha" >> "$GITHUB_OUTPUT"
          echo "short_sha=${source_sha:0:7}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.platform }}
    needs: [prepare]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Prepare platform name
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}

      # The PrairieLearn image is large; reclaim space preinstalled on the
      # runner that we don't need so the build doesn't run out of disk.
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.revision=${{ needs.prepare.outputs.source_sha }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifest and push
    runs-on: ubuntu-24.04
    needs: [prepare, build]

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.release_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
            type=ref,event=branch,enable=${{ github.event_name == 'push' }}
            type=raw,value=sha-${{ needs.prepare.outputs.source_short_sha }}
            type=raw,value=sha-${{ needs.prepare.outputs.source_sha }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
